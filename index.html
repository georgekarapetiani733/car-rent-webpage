<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>car rent webpage</title>
    <link rel="stylesheet" href="./assets/style/style.css">
    <link rel="stylesheet" href="./assets/images/style.css">
</head>
<body>
    <header>
        <nav class="navigation">
            <div class="logo-search-wrapper">

                <div class="logo">
                    <a href="index.html">MORENT</a>
                    </div>
                    <form action="#" class="search-form">
                        <button type="submit" type="search-btn">
                        <img src="./assets/images/search.svg" alt="Search Icon" width="24px" height="24px">
                    </button>
                        <input type="text" placeholder="Search something here">
                        <button type="button" class="filter-btn">
                        <img src="./assets/images/filter.svg" alt="filter icon">
                        </button>
                    </form>
                    <div class="cta-wrapper">

                        <a href="#" class="heart-btn">
                            <img src="./assets/images/heart.svg" alt="heart icon">
                        </a>

                        <a href="#" class="notification-btn">
                            <img src="./assets/images/notification.svg"alt="notification icon">

                            <img src="./assets/images/reddot.svg" alt="red dot" class="red-dot-img">
                        </a>

                        <a href="#" class="setting-btn">
                            <img src="./assets/images/setting-2.svg" alt="setting icon">
                        </a>

                        <a href="#">
                            <img src="./assets/images/profile.svg" alt="profile icon">
                        </a>

                    </div>
            </div>
        </nav>
    </header>
    <main class="container">
     <section class="hero-banners">
        <div class="rental-banner-light-blue">
            <div class="rental-banner-left">
                <h1>The Best Platform for Car Rental</h1>
                <p>Ease of doing a car rental safely and reliably. Of course at a low price.</p>
                <button class="btn-primary">Rental Car</button>
            </div>
            <img src="./assets/images/koenigsegg.svg" alt="white car" class="banner-img">
        </div>
        <div  class="rental-banner-blue">
            <div class="rental-banner-right">
                <h1>Easy way to rent a car at a low price</h1>
                <p>Providing cheap car rental services and safe and comfortable facilities.</p>
                <button class="btn-secondary">Rental Car</button>
            </div>
            <img src="./assets/images/nissangtr.svg" alt="silver car" class="banner-img">
        </div>
     </section>
     <section class="booking-section">
    <div class="booking-form">
        <div class="radio-section">
            <input type="radio" id="pick-up" name="booking-type" checked>
            <label for="pick-up" class="radio-label">Pick - Up</label>
        </div>
        <div class="form-inputs">
            <div class="input-group">
                <label>Locations</label>
                <select><option>Select your city</option></select>
            </div>

            <div class="divider"></div>

            <div class="input-group">
                <label>Date</label>
                <select><option>Select your date</option></select>
            </div>

            <div class="divider"></div>

            <div class="input-group">
                <label>Time</label>
                <select><option>Select your time</option></select>
            </div>
        </div>
    </div> 
   <button class="swap-btn-transparent" aria-label="Swap locations">
    <img src="./assets/images/Switch.svg" alt="swap">
</button>
    <div class="booking-form">
        <div class="radio-section">
            <input type="radio" id="drop-off" name="booking-type">
            <label for="drop-off" class="radio-label">Drop - Off</label>
        </div>
        <div class="form-inputs">
            <div class="input-group">
                <label>Locations</label>
                <select><option>Select your city</option></select>
            </div>
            <div class="divider"></div>

            <div class="input-group">
                <label>Date</label>
                <select><option>Select your date</option></select>
            </div>
            <div class="divider"></div>

            <div class="input-group">
                <label>Time</label>
                <select><option>Select your time</option></select>
            </div>
        </div>
    </div>
</section>
    </main>
</body>
</html>
